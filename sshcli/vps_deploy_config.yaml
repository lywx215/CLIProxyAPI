# ============================================================
# CLIProxyAPI — VPS 自动化部署配置
# ============================================================

# 并行部署数量
parallel_count: 3

# 远程默认部署目录
deploy_path: "/opt/cliproxy"

# Docker 镜像（build_from_source=false 时使用 docker pull）
docker_image: "eceasy/cli-proxy-api:latest"

# true = 上传本地源码到服务器上 docker compose build
# false = 直接 docker pull 预构建镜像（推荐）
build_from_source: true

# 健康检查设置
health_check:
  retries: 5       # 重试次数
  interval: 3      # 每次间隔（秒）
  api_port: 8317   # 检查端口

# ============================================================
# 公共环境变量（所有服务器共享，每台服务器可通过 env_overrides 覆盖）
# ============================================================
common_env:
  OBJECTSTORE_ENDPOINT: "https://cos.na-siliconvalley.myqcloud.com"
  OBJECTSTORE_BUCKET: "gemini-1321633393"
  OBJECTSTORE_ACCESS_KEY: "YOUR_ACCESS_KEY"
  OBJECTSTORE_SECRET_KEY: "YOUR_SECRET_KEY"
  OBJECTSTORE_LOCAL_PATH: "/data/cliproxy/"
  OBJECTSTORE_REGION: "na-siliconvalley"

# ============================================================
# 服务器列表
# ============================================================
# 格式说明:
#   name            — 服务器别名（用于 --servers 参数选择）
#   host            — IP 或域名
#   port            — SSH 端口（默认 22）
#   user            — SSH 用户（默认 root）
#   auth            — 认证方式: "password" | "key"
#   password        — auth=password 时的密码
#   key_file        — auth=key 时的密钥路径（支持 ~ 展开）
#   deploy_path     — 可选，覆盖全局 deploy_path
#   env_overrides   — 可选，覆盖 common_env 中的值
#   config_overrides — 可选，深度合并覆盖 config.yaml 中的值
#   exposed_ports   — 可选，自定义端口映射列表

servers:
  - name: "vps-01"
    host: "149.248.20.234"
    port: 22
    user: "root"
    auth: "password"
    password: "*P6zHkr5L$-AL#()"
    env_overrides:
      OBJECTSTORE_PREFIX: "vps-01"
    config_overrides:
      remote_management:
        disable_auto_update_panel: true
